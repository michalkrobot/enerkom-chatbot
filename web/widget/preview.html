<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elektron — náhled animace</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
  :root{ --bg:#E1F5EE; --dark:#0F6E56; --mid:#1D9E75; --sun:#EF9F27; }
  body{ font-family:system-ui,sans-serif; margin:0; background:#fff; color:#143; }
  .wrap{ max-width:760px; margin:32px auto; padding:0 16px; }
  h1{ font-size:18px; color:var(--dark); }
  .stage{ background:var(--bg); border-radius:20px; padding:18px; display:flex;
          gap:24px; align-items:flex-end; flex-wrap:wrap; }
  #mascot{ width:220px; height:480px; }
  .bubble{ position:relative; background:#fff; border-radius:16px; padding:14px 16px;
           box-shadow:0 6px 20px rgba(15,110,86,.12); max-width:340px; margin-bottom:60px; }
  .dots span{ display:inline-block; width:7px; height:7px; margin:0 2px; border-radius:50%;
              background:var(--mid); animation:b 1.2s infinite; }
  .dots span:nth-child(2){ animation-delay:.2s } .dots span:nth-child(3){ animation-delay:.4s }
  @keyframes b{ 0%,80%,100%{ transform:translateY(0); opacity:.4 } 40%{ transform:translateY(-5px); opacity:1 } }
  .controls{ margin-top:18px; display:flex; gap:8px; flex-wrap:wrap; }
  button{ border:0; border-radius:999px; padding:9px 16px; font-size:14px; cursor:pointer;
          background:var(--mid); color:#fff; }
  button.alt{ background:#cfe9e0; color:var(--dark); }
  .state{ margin-top:10px; font-size:13px; color:#567; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Elektron — animovaný maskot (cut-out Lottie)</h1>
  <div class="stage">
    <div id="mascot"></div>
    <div class="bubble" id="bubble">Ahoj! Zeptej se mě na cokoli o naší organizaci.</div>
  </div>
  <div class="controls">
    <button data-s="idle" class="alt">Klid</button>
    <button data-s="thinking" class="alt">Přemýšlí</button>
    <button data-s="talking" class="alt">Mluví</button>
    <button data-s="notfound" class="alt">Nenašel</button>
    <button id="cycle">▶ Projít všechny</button>
  </div>
  <div class="state">Stav: <b id="cur">idle</b></div>
</div>

<script>
const anim = lottie.loadAnimation({
  container: document.getElementById('mascot'),
  renderer: 'svg', loop: true, autoplay: false,
  path: 'assets/elektron.json',
});

let SEG = {idle:[0,90], thinking:[90,195], talking:[195,285], notfound:[285,360]};
const bubble = document.getElementById('bubble');
const cur = document.getElementById('cur');

function setState(s){
  cur.textContent = s;
  const loopit = s !== 'notfound';
  anim.loop = loopit;
  anim.playSegments(SEG[s], true);
  bubble.innerHTML = ({
    idle: 'Ahoj! Zeptej se mě na cokoli o naší organizaci.',
    thinking: 'Elektron přemýšlí <span class="dots"><span></span><span></span><span></span></span>',
    talking: 'Komunitní energetika znamená, že vyrobenou elektřinu sdílíte mezi sebou…',
    notfound: 'To bohužel nevím. Zkuste se zeptat jinak nebo nás kontaktujte.',
  })[s];
}
anim.addEventListener('DOMLoaded', () => { SEG = (anim.animationData.meta&&anim.animationData.meta.segments)||SEG; setState('idle'); });
window.anim = anim; window.setState = setState;

document.querySelectorAll('button[data-s]').forEach(b =>
  b.onclick = () => setState(b.dataset.s));

document.getElementById('cycle').onclick = () => {
  const order = ['idle','thinking','talking','notfound'];
  let i = 0; setState(order[0]);
  clearInterval(window._cy);
  window._cy = setInterval(()=>{ i=(i+1)%order.length; setState(order[i]); }, 2600);
};
</script>
</body>
</html>
